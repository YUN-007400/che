<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESP32 WiFi 遥控车</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
    text-align:center;
    background-size:cover;
    background-position:center;
}

/* 状态灯区域 */
.statusBox{
    margin-top:15px;
}

.light{
    width:18px;
    height:18px;
    border-radius:50%;
    display:inline-block;
    margin:5px;
    box-shadow:0 0 15px #000;
}

.red{
    background:red;
}

.green{
    background:#00ff88;
}

/* 标题 */
h1{
    margin-top:15px;
}

/* 上传按钮 */
.upload{
    margin-top:10px;
    font-size:16px;
    background:#00c853;
    border:none;
    padding:12px 25px;
    border-radius:25px;
    color:white;
}

/* 背景清晰度调节 */
.bgControl{
    margin-top:10px;
    display:none;
}

/* 遮罩层 */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    pointer-events:none;
}

/* 控制区 */
.container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:30px;
    padding:20px;
}

/* 左右控制区 */
.side{
    display:flex;
    flex-direction:column;
    gap:30px;
}

/* 圆形按钮 */
.btn{
    width:110px;
    height:110px;
    border-radius:50%;
    border:none;
    font-size:20px;
    color:white;
    background:#1f1f1f;
    transition:0.2s;
}

.btn:active{
    background:#00c853;
    box-shadow:0 0 30px #00ffcc;
}

/* 中间速度 */
.center{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

.speed{
    font-size:22px;
    color:#00ffcc;
}
</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<h1>ESP32 WiFi 遥控车</h1>

<!-- 状态灯 -->
<div class="statusBox">
<span id="redLight" class="light red"></span> 未连接
&nbsp;&nbsp;
<span id="greenLight" class="light"></span> 已连接
</div>

<!-- 上传图片 -->
<input type="file" accept="image/*" onchange="changeBG(event)" class="upload" id="uploadBtn">

<!-- 背景清晰度 -->
<div class="bgControl" id="bgControl">
背景清晰度
<br>
<input type="range" min="0" max="80" value="50" oninput="changeBlur(this.value)">
</div>

<div class="container">

<!-- 左侧 -->
<div class="side">
<button class="btn"
onmousedown="send('forward')"
ontouchstart="send('forward')"
onmouseup="send('stop')"
ontouchend="send('stop')">前进</button>

<button class="btn"
onmousedown="send('back')"
ontouchstart="send('back')"
onmouseup="send('stop')"
ontouchend="send('stop')">后退</button>
</div>

<!-- 中间 -->
<div class="center">
<div class="speed" id="speedText">速度：50</div>

<input type="range" min="0" max="100" value="50"
oninput="setSpeed(this.value)">
</div>

<!-- 右侧 -->
<div class="side">
<button class="btn"
onmousedown="send('left')"
ontouchstart="send('left')"
onmouseup="send('stop')"
ontouchend="send('stop')">左转</button>

<button class="btn"
onmousedown="send('right')"
ontouchstart="send('right')"
onmouseup="send('stop')"
ontouchend="send('stop')">右转</button>
</div>

</div>

<script>

/* 发送控制 */
function send(cmd){
fetch("http://192.168.4.1/" + cmd)
}

/* 速度 */
function setSpeed(val){
document.getElementById("speedText").innerText="速度："+val
fetch("http://192.168.4.1/speed?value=" + val)
}

/* 背景图片 */
function changeBG(event){
const file = event.target.files[0]
const reader = new FileReader()

reader.onload = function(e){
document.body.style.backgroundImage = "url('" + e.target.result + "')"
document.getElementById("uploadBtn").style.display="none"
document.getElementById("bgControl").style.display="block"
}

reader.readAsDataURL(file)
}

/* 背景清晰度 */
function changeBlur(value){
document.getElementById("overlay").style.background="rgba(0,0,0," + (value/100) + ")"
}

/* 自动检测连接状态 */
setInterval(function(){

fetch("http://192.168.4.1/status")
.then(() => {
document.getElementById("greenLight").classList.add("green")
document.getElementById("redLight").classList.remove("red")
})
.catch(() => {
document.getElementById("greenLight").classList.remove("green")
document.getElementById("redLight").classList.add("red")
})

},1000)

</script>

</body>
</html>
